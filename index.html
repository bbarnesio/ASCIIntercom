<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ASCIIntercom</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
  @font-face {
    font-family: 'Saans';
    src: url('fonts/Saans-SemiBold.otf') format('opentype');
    font-weight: 600;
    font-style: normal;
  }
  @font-face {
    font-family: 'Saans';
    src: url('fonts/Saans-Regular.otf') format('opentype');
    font-weight: 400;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  header { text-align: center; margin-bottom: 20px; }
  header h1 {
    font-family: 'Saans', sans-serif;
    font-size: 28px; font-weight: 600; letter-spacing: 6px; color: #F4F3EC; margin-bottom: 4px;
  }
  header p { font-family: 'Saans', sans-serif; font-weight: 400; font-size: 12px; color: #555; letter-spacing: 1px; text-transform: uppercase; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 10px; margin-bottom: 12px; align-items: center;
    flex-wrap: wrap; justify-content: flex-start; max-width: 860px; width: 100%;
  }
  .toolbar .group {
    display: flex; gap: 4px; background: #1a1a1a; border-radius: 8px; padding: 4px;
  }
  .toolbar button {
    background: transparent; color: #999; border: none; padding: 7px 14px;
    border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all 0.15s; white-space: nowrap;
  }
  .toolbar button:hover { color: #e0e0e0; background: #2a2a2a; }
  .toolbar button.active { background: #F4F3EC; color: #111; }
  .toolbar button.danger:hover { background: #331111; color: #ff6666; }
  .toolbar button.export-btn { color: #6faa6f; }
  .toolbar button.export-btn:hover { background: #1a2e1a; color: #8fcc8f; }
  .toolbar label {
    font-size: 11px; color: #666; display: flex; align-items: center; gap: 5px; padding: 0 8px;
  }
  .toolbar input[type="range"] { width: 60px; accent-color: #F4F3EC; height: 3px; }
  .toolbar .val {
    color: #999; font-family: 'Courier New', monospace; min-width: 14px; text-align: center;
  }
  .color-options { display: flex; gap: 6px; align-items: center; padding: 0 6px; }
  .color-dot {
    width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; transition: border-color 0.15s, transform 0.15s;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.active { border-color: #F4F3EC; }

  /* ── ASCII Settings ── */
  .ascii-settings {
    display: flex; gap: 10px; margin-bottom: 16px; align-items: center;
    flex-wrap: wrap; justify-content: flex-start; max-width: 860px; width: 100%;
  }
  .ascii-settings .group {
    display: flex; gap: 4px; background: #1a1a1a; border-radius: 8px; padding: 4px; align-items: center;
  }
  .ascii-settings label {
    font-size: 11px; color: #666; padding: 0 8px; display: flex; align-items: center; gap: 5px;
  }
  .ascii-settings select, .ascii-settings input[type="text"] {
    background: #222; color: #e0e0e0; border: 1px solid #333; border-radius: 4px;
    padding: 5px 8px; font-size: 12px; font-family: 'Courier New', monospace;
  }
  .ascii-settings select { cursor: pointer; }
  .ascii-settings input[type="text"] { width: 180px; }
  .ascii-settings input[type="range"] { width: 50px; accent-color: #F4F3EC; height: 3px; }

  /* ── Canvas + Preview ── */
  .workspace {
    display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: flex-start;
    max-width: 860px; width: 100%;
  }
  .canvas-wrap {
    background: #F4F3EC; border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5); position: relative; touch-action: none;
  }
  canvas {
    display: block; border-radius: 4px; cursor: crosshair; max-width: 100%; height: auto;
  }
  .preview-wrap {
    background: #1a1a1a; border-radius: 4px; padding: 0; max-width: 420px;
    max-height: 594px; overflow: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    display: none;
  }
  .preview-wrap.visible { display: block; }
  .preview-wrap pre {
    font-family: 'Courier New', Courier, monospace; font-size: 3.5px; line-height: 3.7px;
    margin: 10px; white-space: pre; color: #F4F3EC; background: none;
  }
  .preview-wrap.style-black { background: #F4F3EC; }
  .preview-wrap.style-black pre { color: #010101; }
  .preview-wrap.style-blue { background: #F4F3EC; }
  .preview-wrap.style-blue pre { color: #0055CC; }
  .preview-wrap.style-fin-blue { background: #F4F3EC; }
  .preview-wrap.style-fin-blue pre { color: #0055CC; }
  .preview-wrap.style-fin-dark { background: #F4F3EC; }
  .preview-wrap.style-fin-dark pre { color: #484743; }
  .preview-wrap.style-fin-gray { background: #F4F3EC; }
  .preview-wrap.style-fin-gray pre { color: #9E9E9E; }

  /* ── Status ── */
  .status {
    margin-top: 14px; font-size: 11px; color: #444; text-align: left; letter-spacing: 0.5px;
    max-width: 860px; width: 100%;
  }
  .status .sep { margin: 0 8px; }
  .status kbd {
    background: #1a1a1a; border: 1px solid #333; border-radius: 3px;
    padding: 1px 5px; font-size: 10px; font-family: 'Courier New', monospace;
  }

  /* ── Shape buttons ── */
  .toolbar button.shape-btn { color: #c9a84c; font-size: 18px; line-height: 1; padding: 4px 12px; }
  .toolbar button.shape-btn:hover { background: #2a2511; color: #e0c56a; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #F4F3EC; color: #111; padding: 10px 24px; border-radius: 8px;
    font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s;
    pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    body { padding: 12px 8px; }
    header h1 { font-size: 20px; letter-spacing: 4px; }
    .toolbar { gap: 6px; }
    .toolbar button { padding: 6px 10px; font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <h1>ASCIINTERCOM</h1>
  <p>ASCI-Intercom.</p>
</header>

<!-- Drawing tools -->
<div class="toolbar">
  <div class="group">
    <button id="btnDraw" class="active" onclick="setTool('draw')">Draw</button>
    <button id="btnErase" onclick="setTool('erase')">Erase</button>
    <button id="btnSelect" onclick="setTool('select')">Select</button>
  </div>
  <div class="group">
    <button class="shape-btn" onclick="addShape('square')" title="Square" style="font-size:21px">&#9632;</button>
    <button class="shape-btn" onclick="addShape('circle')" title="Circle" style="font-size:21px">&#9679;</button>
    <button class="shape-btn" onclick="addShape('triangle')" title="Triangle">&#9650;</button>
  </div>
  <div class="group">
    <label>Size <input type="range" id="brushSize" min="1" max="24" value="4" oninput="updateBrush()"> <span class="val" id="brushLabel">4</span></label>
    <label>Smooth <input type="range" id="smoothing" min="0" max="5" value="3" oninput="updateSmoothing()"> <span class="val" id="smoothLabel">3</span></label>
  </div>
  <div class="color-options">
    <div class="color-dot active" style="background:#231f20;" onclick="setColor('#231f20', this)" title="Black"></div>
    <div class="color-dot" style="background:#484743;" onclick="setColor('#484743', this)" title="Charcoal"></div>
    <div class="color-dot" style="background:#9E9E9E;" onclick="setColor('#9E9E9E', this)" title="Gray"></div>
    <div class="color-dot" style="background:#0055CC;" onclick="setColor('#0055CC', this)" title="Blue"></div>
  </div>
  <div class="group">
    <button onclick="document.getElementById('photoInput').click()" style="color:#8fb8de;">Photo</button>
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="loadPhoto(this)">
  </div>
  <div class="group">
    <button onclick="undo()">Undo</button>
    <button class="danger" onclick="clearCanvas()">Clear</button>
  </div>
</div>

<!-- ASCII settings -->
<div class="ascii-settings">
  <div class="group">
    <label>Style
      <select id="asciiStyle" onchange="updateAsciiSettings()">
        <option value="black">Black</option>
        <option value="blue">Blue</option>
        <option value="fin-blue">Fin Blue</option>
        <option value="fin-dark" selected>Fin Dark</option>
        <option value="fin-gray">Fin Gray</option>
      </select>
    </label>
  </div>
  <div class="group">
    <label>Fill <input type="text" id="asciiFill" value="Fin " onchange="updateAsciiSettings()"></label>
  </div>
  <div class="group">
    <label>Mode
      <select id="asciiMode">
        <option value="filled">Filled</option>
        <option value="outline">Outline</option>
      </select>
    </label>
  </div>
  <div class="group">
    <label>Weight <input type="range" id="asciiThickness" min="1" max="20" value="1" oninput="document.getElementById('thickVal').textContent=this.value"> <span class="val" id="thickVal">1</span></label>
    <label>Thresh <input type="range" id="asciiThreshold" min="60" max="220" value="180" oninput="document.getElementById('threshVal').textContent=this.value"> <span class="val" id="threshVal">180</span></label>
  </div>
  <div class="group">
    <button onclick="previewASCII()" style="color:#dda0dd;">Preview</button>
    <button class="export-btn" onclick="exportAsciiSVG()">Export SVG</button>
    <button class="export-btn" onclick="exportAsciiAI()">Export .ai</button>
  </div>
</div>

<!-- Workspace -->
<div class="workspace">
  <div class="canvas-wrap">
    <canvas id="pad" width="840" height="1188"></canvas>
  </div>
  <div class="preview-wrap" id="previewWrap">
    <pre id="previewText"></pre>
  </div>
</div>

<div class="status">
  <span id="strokeCount">0</span> strokes
  <span class="sep">/</span>
  <span id="pointCount">0</span> pts
  <span class="sep">/</span>
  A3 ratio
  <span class="sep">/</span>
  <kbd>D</kbd> draw <kbd>E</kbd> erase <kbd>V</kbd> select <kbd>Cmd+Z</kbd> undo <kbd>P</kbd> preview
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// DRAWING ENGINE
// ═══════════════════════════════════════════════
const canvas = document.getElementById('pad');
const ctx = canvas.getContext('2d');

let strokes = [];
let currentStroke = null;
let tool = 'draw';
let brushSize = 4;
let smoothLevel = 3;
let strokeColor = '#231f20';
let isDrawing = false;

// Shape system
let shapes = [];
let actionHistory = []; // 'stroke' | 'shape' — tracks order for undo
let dragState = null; // { shapeIdx, pointIdx } when dragging a control point
const HANDLE_RADIUS = 10; // hit area for control points (canvas px)

ctx.fillStyle = '#F4F3EC';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let clientX, clientY, pressure = 0.5;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
    pressure = e.touches[0].force || 0.5;
  } else {
    clientX = e.clientX; clientY = e.clientY; pressure = e.pressure || 0.5;
  }
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY, pressure };
}

// ── Shape creation ──
function addShape(type) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  let pts;
  if (type === 'square') {
    const s = 200;
    pts = [
      { x: cx - s, y: cy - s }, { x: cx + s, y: cy - s },
      { x: cx + s, y: cy + s }, { x: cx - s, y: cy + s }
    ];
  } else if (type === 'triangle') {
    const s = 220;
    pts = [
      { x: cx, y: cy - s },
      { x: cx + s * Math.cos(Math.PI / 6), y: cy + s * Math.sin(Math.PI / 6) },
      { x: cx - s * Math.cos(Math.PI / 6), y: cy + s * Math.sin(Math.PI / 6) }
    ];
  } else if (type === 'circle') {
    const r = 200, n = 16;
    pts = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    }
  }
  shapes.push({ type, points: pts, color: strokeColor });
  actionHistory.push('shape');
  setTool('select');
  redraw();
  updateStatus();
}

// ── Hit testing — ray-casting point-in-polygon ──
function pointInShape(pos, shape) {
  const pts = shape.points;
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const xi = pts[i].x, yi = pts[i].y, xj = pts[j].x, yj = pts[j].y;
    if (((yi > pos.y) !== (yj > pos.y)) && (pos.x < (xj - xi) * (pos.y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// ── Pointer events — routes to draw/erase or select ──
function onPointerDown(e) {
  e.preventDefault();
  const pos = getPos(e);

  if (tool === 'select') {
    // Priority 1: check control points
    for (let si = shapes.length - 1; si >= 0; si--) {
      for (let pi = 0; pi < shapes[si].points.length; pi++) {
        const pt = shapes[si].points[pi];
        const dx = pos.x - pt.x, dy = pos.y - pt.y;
        if (dx * dx + dy * dy < HANDLE_RADIUS * HANDLE_RADIUS) {
          dragState = { shapeIdx: si, pointIdx: pi, mode: 'point' };
          return;
        }
      }
    }
    // Priority 2: check if inside a shape (point-in-polygon) for whole-shape drag
    for (let si = shapes.length - 1; si >= 0; si--) {
      if (pointInShape(pos, shapes[si])) {
        dragState = { shapeIdx: si, mode: 'move', startX: pos.x, startY: pos.y,
          origPoints: shapes[si].points.map(p => ({ x: p.x, y: p.y })) };
        return;
      }
    }
    // Priority 3: check if inside a photo for photo drag
    for (let pi = photos.length - 1; pi >= 0; pi--) {
      const p = photos[pi];
      if (pos.x >= p.x && pos.x <= p.x + p.w && pos.y >= p.y && pos.y <= p.y + p.h) {
        dragState = { photoIdx: pi, mode: 'photo', startX: pos.x, startY: pos.y,
          origX: p.x, origY: p.y };
        return;
      }
    }
    dragState = null;
    return;
  }

  // Draw / Erase mode
  isDrawing = true;
  currentStroke = { points: [pos], color: strokeColor, size: brushSize, smoothed: [] };
  if (tool === 'erase') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
    ctx.strokeStyle = 'rgba(0,0,0,1)'; ctx.lineWidth = brushSize * 4;
  }
}

function onPointerMove(e) {
  e.preventDefault();
  const pos = getPos(e);

  if (tool === 'select') {
    if (!dragState) return;
    if (dragState.mode === 'point') {
      shapes[dragState.shapeIdx].points[dragState.pointIdx] = { x: pos.x, y: pos.y };
    } else if (dragState.mode === 'move') {
      const dx = pos.x - dragState.startX, dy = pos.y - dragState.startY;
      const pts = shapes[dragState.shapeIdx].points;
      for (let i = 0; i < pts.length; i++) {
        pts[i].x = dragState.origPoints[i].x + dx;
        pts[i].y = dragState.origPoints[i].y + dy;
      }
    } else if (dragState.mode === 'photo') {
      const dx = pos.x - dragState.startX, dy = pos.y - dragState.startY;
      photos[dragState.photoIdx].x = dragState.origX + dx;
      photos[dragState.photoIdx].y = dragState.origY + dy;
    }
    redraw();
    return;
  }

  // Draw / Erase mode
  if (!isDrawing) return;
  currentStroke.points.push(pos);
  if (tool === 'erase') {
    ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
  } else {
    redraw();
    const pts = currentStroke.points;
    if (pts.length >= 2) {
      ctx.beginPath(); ctx.strokeStyle = currentStroke.color;
      ctx.lineWidth = Math.max(1.5, currentStroke.size); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();
    }
  }
}

function onPointerUp(e) {
  e.preventDefault();

  if (tool === 'select') {
    dragState = null;
    return;
  }

  if (!isDrawing) return;
  isDrawing = false;
  ctx.globalCompositeOperation = 'source-over';
  if (currentStroke && currentStroke.points.length > 1 && tool === 'draw') {
    currentStroke.smoothed = smoothStroke(currentStroke.points, smoothLevel);
    strokes.push(currentStroke);
    actionHistory.push('stroke');
    redraw();
  }
  currentStroke = null; updateStatus();
}

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointermove', onPointerMove);
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('pointerleave', onPointerUp);
canvas.addEventListener('pointercancel', onPointerUp);
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

function smoothStroke(points, level) {
  if (level === 0 || points.length < 3) return points.map(p => ({ x: p.x, y: p.y }));
  let pts = points;
  if (pts.length > 500) { const step = Math.ceil(pts.length / 500); pts = pts.filter((_, i) => i % step === 0 || i === pts.length - 1); }
  let smoothed = pts.map(p => ({ x: p.x, y: p.y }));
  for (let iter = 0; iter < level; iter++) {
    const next = [smoothed[0]];
    for (let i = 1; i < smoothed.length - 1; i++) {
      next.push({ x: smoothed[i].x * 0.5 + (smoothed[i-1].x + smoothed[i+1].x) * 0.25, y: smoothed[i].y * 0.5 + (smoothed[i-1].y + smoothed[i+1].y) * 0.25 });
    }
    next.push(smoothed[smoothed.length - 1]); smoothed = next;
  }
  return smoothed;
}

function setTool(t) {
  tool = t;
  document.getElementById('btnDraw').classList.toggle('active', t === 'draw');
  document.getElementById('btnErase').classList.toggle('active', t === 'erase');
  document.getElementById('btnSelect').classList.toggle('active', t === 'select');
  canvas.style.cursor = t === 'select' ? 'default' : t === 'erase' ? 'cell' : 'crosshair';
  redraw();
}
function setColor(hex, el) {
  strokeColor = hex;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
}
function updateBrush() { brushSize = parseInt(document.getElementById('brushSize').value); document.getElementById('brushLabel').textContent = brushSize; }
function updateSmoothing() { smoothLevel = parseInt(document.getElementById('smoothing').value); document.getElementById('smoothLabel').textContent = smoothLevel; }

// Photo objects: { img, x, y, w, h }
let photos = [];

function loadPhoto(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const img = new Image();
  img.onload = function() {
    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
    const w = img.width * scale;
    const h = img.height * scale;
    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;
    photos.push({ img, x, y, w, h });
    actionHistory.push('photo');
    setTool('select');
    redraw();
    updateStatus();
    showToast('Photo loaded — drag to move, adjust Thresh and preview');
    input.value = '';
  };
  img.src = URL.createObjectURL(file);
}

function clearCanvas() {
  strokes = []; shapes = []; photos = []; actionHistory = []; dragState = null;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = '#F4F3EC'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  updateStatus(); hidePreview();
}

function undo() {
  if (actionHistory.length === 0) return;
  const last = actionHistory.pop();
  if (last === 'stroke') strokes.pop();
  else if (last === 'shape') shapes.pop();
  else if (last === 'photo') photos.pop();
  redraw(); updateStatus();
}

function redraw(showHandles) {
  if (showHandles === undefined) showHandles = true;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = '#F4F3EC'; ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw photos
  for (const photo of photos) {
    ctx.drawImage(photo.img, photo.x, photo.y, photo.w, photo.h);
  }

  // Draw freehand strokes
  for (const stroke of strokes) {
    const pts = stroke.smoothed.length > 0 ? stroke.smoothed : stroke.points;
    if (pts.length < 2) continue;
    ctx.beginPath(); ctx.strokeStyle = stroke.color || '#231f20';
    ctx.lineWidth = Math.max(1.5, stroke.size || brushSize); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  // Draw shapes as closed paths
  for (const shape of shapes) {
    const pts = shape.points;
    if (pts.length < 2) continue;
    ctx.beginPath(); ctx.strokeStyle = shape.color || '#231f20';
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath(); ctx.stroke();
  }

  // Draw control point handles when in select mode
  if (showHandles && tool === 'select') {
    for (const shape of shapes) {
      for (const pt of shape.points) {
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.strokeStyle = shape.color || '#231f20'; ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }
  }
}

function updateStatus() {
  const totalPts = strokes.reduce((sum, s) => sum + s.points.length, 0)
    + shapes.reduce((sum, s) => sum + s.points.length, 0);
  document.getElementById('strokeCount').textContent = strokes.length + shapes.length;
  document.getElementById('pointCount').textContent = totalPts;
}

// ═══════════════════════════════════════════════
// ASCII SETTINGS
// ═══════════════════════════════════════════════
const STYLE_DEFAULTS = {
  'fin-blue': 'Fin ', 'fin-dark': 'Fin ', 'fin-gray': 'Fin ',
};

function updateAsciiSettings() {
  const style = document.getElementById('asciiStyle').value;
  if (STYLE_DEFAULTS[style] !== undefined) {
    document.getElementById('asciiFill').value = STYLE_DEFAULTS[style];
  }
}

// ═══════════════════════════════════════════════
// ASCII CONVERSION ENGINE
// ═══════════════════════════════════════════════
const PAGE_W = 841.89, PAGE_H = 1190.55;
const MARGIN = 100, FONT_SZ = 7, LINE_H = 7.35, CHAR_W = FONT_SZ * 0.6;

const STYLES = {
  'black':    { bg: '#F4F3EC', fg: '#010101', bgRgb: [0.957,0.953,0.925], fgRgb: [0.004,0.004,0.004] },
  'blue':     { bg: '#F4F3EC', fg: '#0055CC', bgRgb: [0.957,0.953,0.925], fgRgb: [0.0,0.333,0.8] },
  'fin-blue': { bg: '#F4F3EC', fg: '#0055CC', bgRgb: [0.957,0.953,0.925], fgRgb: [0.0,0.333,0.8] },
  'fin-dark': { bg: '#F4F3EC', fg: '#484743', bgRgb: [0.957,0.953,0.925], fgRgb: [0.282,0.278,0.263] },
  'fin-gray': { bg: '#F4F3EC', fg: '#9E9E9E', bgRgb: [0.957,0.953,0.925], fgRgb: [0.620,0.620,0.620] },
};

function canvasToGrid() {
  const threshold = parseInt(document.getElementById('asciiThreshold').value);
  const thickness = parseInt(document.getElementById('asciiThickness').value);
  const mode = document.getElementById('asciiMode').value;

  // Clean redraw without anchor point handles before sampling
  redraw(false);
  const w = canvas.width, h = canvas.height;
  const imageData = ctx.getImageData(0, 0, w, h);
  const px = imageData.data;
  // Restore handles after capturing pixels
  redraw(true);

  // Helper: luminance at pixel (x, y)
  function lum(x, y) {
    const i = (y * w + x) * 4;
    return 0.299 * px[i] + 0.587 * px[i+1] + 0.114 * px[i+2];
  }

  // Step 1: Find bounding box of dark pixels directly on the canvas
  let pxMinX = w, pxMaxX = 0, pxMinY = h, pxMaxY = 0;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (lum(x, y) < threshold) {
        if (x < pxMinX) pxMinX = x;
        if (x > pxMaxX) pxMaxX = x;
        if (y < pxMinY) pxMinY = y;
        if (y > pxMaxY) pxMaxY = y;
      }
    }
  }

  if (pxMaxX < pxMinX) return { lines: [], rows: 0, cols: 0 }; // empty

  // Add 5% padding around content (in pixel space)
  const contentW = pxMaxX - pxMinX + 1;
  const contentH = pxMaxY - pxMinY + 1;
  const padX = Math.max(4, Math.floor(contentW * 0.05));
  const padY = Math.max(4, Math.floor(contentH * 0.05));
  pxMinX = Math.max(0, pxMinX - padX); pxMaxX = Math.min(w - 1, pxMaxX + padX);
  pxMinY = Math.max(0, pxMinY - padY); pxMaxY = Math.min(h - 1, pxMaxY + padY);

  const bboxW = pxMaxX - pxMinX + 1;
  const bboxH = pxMaxY - pxMinY + 1;

  // Step 2: Compute output grid dimensions preserving aspect ratio
  const outCols = Math.floor((PAGE_W - 2 * MARGIN) / CHAR_W);
  const maxRows = Math.floor((PAGE_H - 2 * MARGIN) / LINE_H);
  // Content aspect in pixel space, corrected for character cell proportions
  const contentAspect = (bboxH / bboxW) * (CHAR_W / LINE_H);
  const outRows = Math.min(Math.floor(outCols * contentAspect), maxRows);

  if (outRows < 1) return { lines: [], rows: 0, cols: 0 };

  // Step 3: Sample canvas pixels for freehand strokes
  // Count dark pixels per cell — requires >= 2 dark pixels to fill.
  // This filters single anti-aliased edge pixels while keeping thin strokes.
  const cellPxW = bboxW / outCols;
  const cellPxH = bboxH / outRows;

  const grid = [];
  for (let r = 0; r < outRows; r++) {
    grid[r] = [];
    const srcY0 = Math.floor(pxMinY + r * cellPxH);
    const srcY1 = Math.min(Math.floor(pxMinY + (r + 1) * cellPxH), pxMaxY + 1);
    for (let c = 0; c < outCols; c++) {
      const srcX0 = Math.floor(pxMinX + c * cellPxW);
      const srcX1 = Math.min(Math.floor(pxMinX + (c + 1) * cellPxW), pxMaxX + 1);
      let darkCount = 0;
      for (let py = srcY0; py < srcY1; py++) {
        for (let ppx = srcX0; ppx < srcX1; ppx++) {
          if (lum(ppx, py) < threshold) darkCount++;
        }
      }
      grid[r][c] = darkCount >= 2;
    }
  }

  // Step 3b: Overlay shapes directly via Bresenham line rasterization
  // Bypasses canvas pixel sampling for mathematically precise edges
  if (shapes.length > 0) {
    function bresenham(r0, c0, r1, c1) {
      r0 = Math.round(r0); c0 = Math.round(c0);
      r1 = Math.round(r1); c1 = Math.round(c1);
      const dr = Math.abs(r1 - r0), dc = Math.abs(c1 - c0);
      const sr = r0 < r1 ? 1 : -1, sc = c0 < c1 ? 1 : -1;
      let err = dc - dr, r = r0, c = c0;
      while (true) {
        if (r >= 0 && r < outRows && c >= 0 && c < outCols) grid[r][c] = true;
        if (r === r1 && c === c1) break;
        const e2 = 2 * err;
        if (e2 > -dr) { err -= dr; c += sc; }
        if (e2 < dc) { err += dc; r += sr; }
      }
    }
    for (const shape of shapes) {
      const pts = shape.points;
      for (let i = 0; i < pts.length; i++) {
        const a = pts[i], b = pts[(i + 1) % pts.length];
        // Map canvas coords to grid coords
        const gr0 = (a.y - pxMinY) / cellPxH;
        const gc0 = (a.x - pxMinX) / cellPxW;
        const gr1 = (b.y - pxMinY) / cellPxH;
        const gc1 = (b.x - pxMinX) / cellPxW;
        bresenham(gr0, gc0, gr1, gc1);
      }
    }
  }

  // Apply weight — omnidirectional dilation
  // Weight 1 = hairline (no dilation), each step adds 1 cell of expansion
  const dilateN = thickness - 1;
  if (dilateN > 0) {
    const dilated = grid.map(row => [...row]);
    for (let r = 0; r < outRows; r++) {
      for (let c = 0; c < outCols; c++) {
        if (grid[r][c]) {
          for (let dr = -dilateN; dr <= dilateN; dr++) {
            for (let dc = -dilateN; dc <= dilateN; dc++) {
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < outRows && nc >= 0 && nc < outCols) {
                dilated[nr][nc] = true;
              }
            }
          }
        }
      }
    }
    for (let r = 0; r < outRows; r++) {
      for (let c = 0; c < outCols; c++) {
        grid[r][c] = dilated[r][c];
      }
    }
  }

  // Outline mode: keep only border cells
  if (mode === 'outline') {
    const outline = [];
    for (let r = 0; r < outRows; r++) {
      outline[r] = [];
      for (let c = 0; c < outCols; c++) {
        if (!grid[r][c]) { outline[r][c] = false; continue; }
        let isBorder = false;
        for (let dr = -1; dr <= 1 && !isBorder; dr++) {
          for (let dc = -1; dc <= 1 && !isBorder; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr, nc = c + dc;
            if (nr < 0 || nr >= outRows || nc < 0 || nc >= outCols || !grid[nr][nc]) isBorder = true;
          }
        }
        outline[r][c] = isBorder;
      }
    }
    return flowText(outline, outRows, outCols);
  }

  return flowText(grid, outRows, outCols);
}

function flowText(grid, rows, cols) {
  const fillText = document.getElementById('asciiFill').value || 's';
  const lines = [];
  let textIdx = 0;

  for (let r = 0; r < rows; r++) {
    let line = '';
    for (let c = 0; c < cols; c++) {
      if (grid[r][c]) {
        line += fillText[textIdx % fillText.length];
        textIdx++;
      } else {
        line += ' ';
      }
    }
    lines.push(line.replace(/\s+$/, ''));
  }

  // Trim empty lines
  while (lines.length > 0 && lines[lines.length - 1].trim() === '') lines.pop();
  while (lines.length > 0 && lines[0].trim() === '') lines.shift();

  return { lines, rows: lines.length, cols };
}

// ═══════════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════════
function previewASCII() {
  if (strokes.length === 0 && shapes.length === 0 && photos.length === 0) { showToast('Draw, add a shape, or upload a photo first'); return; }
  const result = canvasToGrid();
  if (result.lines.length === 0) { showToast('Nothing detected — try lowering threshold'); return; }

  const wrap = document.getElementById('previewWrap');
  const pre = document.getElementById('previewText');
  pre.textContent = result.lines.join('\n');

  // Apply style class
  const style = document.getElementById('asciiStyle').value;
  wrap.className = 'preview-wrap visible style-' + style;
  showToast(result.lines.length + ' lines, ' + result.lines.reduce((s, l) => s + [...l].filter(c => c !== ' ').length, 0) + ' filled');
}

function hidePreview() {
  document.getElementById('previewWrap').classList.remove('visible');
}

// ═══════════════════════════════════════════════
// EXPORT ASCII SVG
// ═══════════════════════════════════════════════
function exportAsciiSVG() {
  if (strokes.length === 0 && shapes.length === 0 && photos.length === 0) { showToast('Draw, add a shape, or upload a photo first'); return; }
  const result = canvasToGrid();
  if (result.lines.length === 0) { showToast('Nothing detected'); return; }

  const style = STYLES[document.getElementById('asciiStyle').value] || STYLES['black'];
  let svg = '<?xml version="1.0" encoding="UTF-8"?>\n';
  svg += '<!-- Generator: ASCIIntercom -->\n';
  svg += `<svg version="1.1" xmlns="http://www.w3.org/2000/svg"\n`;
  svg += `     x="0px" y="0px" viewBox="0 0 ${PAGE_W} ${PAGE_H}"\n`;
  svg += `     width="${PAGE_W}px" height="${PAGE_H}px" xml:space="preserve">\n`;
  svg += `  <g id="Background">\n`;
  svg += `    <rect fill="${style.bg}" width="${PAGE_W}" height="${PAGE_H}"/>\n`;
  svg += `  </g>\n  <g id="ASCII_Art">\n`;

  for (let i = 0; i < result.lines.length; i++) {
    if (result.lines[i].trim() === '') continue;
    const y = MARGIN + (i * LINE_H);
    const escaped = result.lines[i].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
    svg += `      <text transform="translate(${MARGIN} ${y.toFixed(1)})" font-family="Courier New, Courier, monospace" font-size="${FONT_SZ}" fill="${style.fg}" xml:space="preserve">${escaped}</text>\n`;
  }

  svg += '  </g>\n</svg>';
  downloadFile(svg, 'asciintercom-ascii.svg', 'image/svg+xml');
  showToast('ASCII SVG exported');
}

// ═══════════════════════════════════════════════
// EXPORT ASCII .AI (PDF 1.5)
// ═══════════════════════════════════════════════
function pdfEscape(s) {
  return s.replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
}

function exportAsciiAI() {
  if (strokes.length === 0 && shapes.length === 0 && photos.length === 0) { showToast('Draw, add a shape, or upload a photo first'); return; }
  const result = canvasToGrid();
  if (result.lines.length === 0) { showToast('Nothing detected'); return; }

  const style = STYLES[document.getElementById('asciiStyle').value] || STYLES['black'];
  const [bgR, bgG, bgB] = style.bgRgb;
  const [fgR, fgG, fgB] = style.fgRgb;

  // Build content stream
  let content = '';
  content += `${bgR.toFixed(3)} ${bgG.toFixed(3)} ${bgB.toFixed(3)} rg\n`;
  content += `0 0 ${PAGE_W.toFixed(2)} ${PAGE_H.toFixed(2)} re f\n`;
  content += 'BT\n';
  content += `/F1 ${FONT_SZ} Tf\n`;
  content += `${fgR.toFixed(3)} ${fgG.toFixed(3)} ${fgB.toFixed(3)} rg\n`;

  for (let i = 0; i < result.lines.length; i++) {
    const y = PAGE_H - MARGIN - (i * LINE_H);
    const escaped = pdfEscape(result.lines[i]);
    if (i === 0) {
      content += `${MARGIN.toFixed(2)} ${y.toFixed(2)} Td\n`;
    } else {
      content += `0 ${(-LINE_H).toFixed(2)} Td\n`;
    }
    content += `(${escaped}) Tj\n`;
  }
  content += 'ET\n';

  // Encode to bytes
  const contentBytes = new TextEncoder().encode(content);

  // Build PDF objects
  const obj1 = '<< /Type /Catalog /Pages 2 0 R >>';
  const obj2 = '<< /Type /Pages /Kids [3 0 R] /Count 1 >>';
  const obj3 = `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PAGE_W.toFixed(2)} ${PAGE_H.toFixed(2)}] /Contents 4 0 R /Resources << /Font << /F1 5 0 R >> >> >>`;
  const obj4Pre = `<< /Length ${contentBytes.length} >>\nstream\n`;
  const obj4Post = '\nendstream';
  const obj5 = '<< /Type /Font /Subtype /Type1 /BaseFont /Courier >>';

  // Assemble PDF
  let pdf = '%PDF-1.5\n%\u00e2\u00e3\u00cf\u00d3\n';
  const offsets = {};

  function addObj(num, data) {
    offsets[num] = pdf.length;
    pdf += `${num} 0 obj\n${data}\nendobj\n`;
  }

  addObj(1, obj1);
  addObj(2, obj2);
  addObj(3, obj3);

  // Object 4 needs binary content
  offsets[4] = pdf.length;
  pdf += '4 0 obj\n' + obj4Pre;
  // We'll handle the binary merge below

  const preBytes = new TextEncoder().encode(pdf);
  const postStr = obj4Post + '\nendobj\n';

  // Object 5
  const obj5Full = '5 0 obj\n' + obj5 + '\nendobj\n';
  const obj5Offset = preBytes.length + contentBytes.length + new TextEncoder().encode(postStr).length;

  const postBytes = new TextEncoder().encode(postStr);
  const obj5Bytes = new TextEncoder().encode(obj5Full);

  // Xref
  offsets[5] = preBytes.length + contentBytes.length + postBytes.length;
  const xrefStart = offsets[5] + obj5Bytes.length;

  let xref = 'xref\n0 6\n0000000000 65535 f \n';
  for (let i = 1; i <= 5; i++) {
    const off = i === 5 ? offsets[5] : (i === 4 ? offsets[4] : null);
    if (i < 4) {
      xref += String(offsets[i]).padStart(10, '0') + ' 00000 n \n';
    } else if (i === 4) {
      xref += String(offsets[4]).padStart(10, '0') + ' 00000 n \n';
    } else {
      xref += String(offsets[5]).padStart(10, '0') + ' 00000 n \n';
    }
  }
  xref += `trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF\n`;

  const xrefBytes = new TextEncoder().encode(xref);

  // Merge all
  const totalLen = preBytes.length + contentBytes.length + postBytes.length + obj5Bytes.length + xrefBytes.length;
  const pdfArr = new Uint8Array(totalLen);
  let offset = 0;
  pdfArr.set(preBytes, offset); offset += preBytes.length;
  pdfArr.set(contentBytes, offset); offset += contentBytes.length;
  pdfArr.set(postBytes, offset); offset += postBytes.length;
  pdfArr.set(obj5Bytes, offset); offset += obj5Bytes.length;
  pdfArr.set(xrefBytes, offset);

  const blob = new Blob([pdfArr], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'asciintercom-ascii.ai'; a.click();
  URL.revokeObjectURL(url);
  showToast('ASCII .ai exported');
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'z' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); undo(); }
  if (e.key === 'd') setTool('draw');
  if (e.key === 'e') setTool('erase');
  if (e.key === 'v') setTool('select');
  if (e.key === 'p') previewASCII();
});
